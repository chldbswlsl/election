name: Daily change check

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # 공직선거법 §108 — 5/28 ~ 6/3 18:00 사이 자동 알림 중단
      - name: Check 공표금지 blackout
        id: blackout
        run: |
          today=$(TZ=Asia/Seoul date +%s)
          start=$(TZ=Asia/Seoul date -d "2026-05-28 00:00" +%s)
          end=$(TZ=Asia/Seoul date -d "2026-06-03 18:00" +%s)
          if [ "$today" -ge "$start" ] && [ "$today" -le "$end" ]; then
            echo "::warning::공표금지 기간 — 작업 중단"
            echo "blackout=true" >> $GITHUB_OUTPUT
          else
            echo "blackout=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.blackout.outputs.blackout != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.blackout.outputs.blackout != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run change detector
        if: steps.blackout.outputs.blackout != 'true'
        id: check
        run: python scripts/check_changes.py

      # 변경 감지 시 Issue 자동 생성 (중복 방지: 같은 제목 미해결 issue 있으면 스킵)
      - name: Create issue
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.issue_body.md', 'utf8');
            const today = new Date().toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' });
            const title = `[자동] 위키백과 변경 감지 — ${today}`;

            // 같은 제목의 미해결 issue 있는지 확인
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'wiki-change',
            });
            for (const it of existing.data) {
              if (it.title === title) {
                console.log(`이미 같은 issue 존재: #${it.number}`);
                return;
              }
            }
            const newIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['wiki-change', 'manual-review'],
            });
            console.log(`Issue 생성: #${newIssue.data.number}`);

      # 상태 파일을 main 에 commit (다음 run 에서 비교 기준)
      - name: Commit state
        if: steps.blackout.outputs.blackout != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain .wiki_state.json)" ]; then
            git add .wiki_state.json
            git commit -m "chore: update wiki state ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            git push
          else
            echo "상태 변경 없음"
          fi
